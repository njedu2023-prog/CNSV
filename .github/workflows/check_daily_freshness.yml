name: Check CNSV Daily Freshness

on:
  workflow_dispatch:
  schedule:
    # Beijing 22:00, after the 20:04 update and all scheduled fallbacks.
    - cron: "0 14 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: cnsv-daily-freshness-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify upstream, model, and decision dates
        id: freshness
        continue-on-error: true
        env:
          UPSTREAM_READY_URL: https://raw.githubusercontent.com/njedu2023-prog/CNSVdata/refs/heads/main/metadata/downstream_ready.json
          UPSTREAM_NEXT_DATE_URL: https://raw.githubusercontent.com/njedu2023-prog/CNSVdata/refs/heads/main/metadata/daily/daily_next_trade_date.json
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          def remote_json(url):
              request = urllib.request.Request(
                  url,
                  headers={"Cache-Control": "no-cache", "User-Agent": "CNSV-freshness-monitor"},
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          def iso_date(value):
              text = str(value or "")[:10].replace("-", "")
              return f"{text[:4]}-{text[4:6]}-{text[6:8]}" if len(text) == 8 and text.isdigit() else ""

          errors = []
          try:
              upstream = remote_json(os.environ["UPSTREAM_READY_URL"])
          except Exception as exc:
              upstream = {}
              errors.append(f"failed to read CNSVdata readiness: {type(exc).__name__}: {exc}")
          try:
              next_date_payload = remote_json(os.environ["UPSTREAM_NEXT_DATE_URL"])
          except Exception as exc:
              next_date_payload = {}
              errors.append(f"failed to read CNSVdata next trade date: {type(exc).__name__}: {exc}")
          report_path = Path("docs/data/latest_trading_decision_report.json")
          if not report_path.exists():
              errors.append("latest_trading_decision_report.json is missing")
              report = {}
          else:
              report = json.loads(report_path.read_text(encoding="utf-8"))

          now = datetime.now(ZoneInfo("Asia/Shanghai"))
          today = now.date().isoformat()
          upstream_date = iso_date(upstream.get("latest_trade_date"))
          next_trade_date = iso_date(next_date_payload.get("next_trade_date"))
          report_date = iso_date(report.get("trade_date"))
          timeline = report.get("decision_timeline") or {}
          probability = report.get("probability") or {}

          if not upstream.get("ready") or upstream.get("status") not in {"PASS", "WARN"}:
              errors.append(f"CNSVdata is not ready: status={upstream.get('status')}")
          if next_trade_date and today >= next_trade_date and upstream_date < next_trade_date:
              errors.append(f"CNSVdata close data is stale: today={today}, latest={upstream_date}, expected={next_trade_date}")
          if report_date != upstream_date:
              errors.append(f"CNSV report date mismatch: report={report_date}, upstream={upstream_date}")
          if iso_date(timeline.get("data_trade_date")) != report_date:
              errors.append("decision_timeline.data_trade_date does not match report trade_date")
          if next_trade_date and iso_date(timeline.get("prediction_date")) != next_trade_date:
              errors.append(
                  f"prediction date mismatch: report={timeline.get('prediction_date')}, expected={next_trade_date}"
              )
          if not probability.get("model_ready"):
              errors.append(f"T+1 model is unavailable: {probability.get('fallback_reason')}")
          if iso_date(probability.get("latest_data_trade_date")) != report_date:
              errors.append("T+1 model data date does not match report trade_date")
          if probability.get("predicted_direction") not in {"UP", "DOWN"}:
              errors.append(f"invalid T+1 direction: {probability.get('predicted_direction')}")

          summary = {
              "checked_at_beijing": now.isoformat(),
              "today": today,
              "upstream_date": upstream_date,
              "next_trade_date": next_trade_date,
              "report_date": report_date,
              "prediction_date": timeline.get("prediction_date"),
              "model_id": probability.get("model_id"),
              "errors": errors,
          }
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          Path("/tmp/cnsv_freshness_summary.json").write_text(
              json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          if errors:
              raise SystemExit(1)
          PY

      - name: Open or update freshness incident
        if: steps.freshness.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = '[AUTO] CNSV daily update is stale';
            const summary = fs.readFileSync('/tmp/cnsv_freshness_summary.json', 'utf8');
            const body = `The 22:00 Beijing freshness check failed.\n\n\`\`\`json\n${summary}\n\`\`\`\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const incident = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (incident) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: incident.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Close recovered freshness incident
        if: steps.freshness.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[AUTO] CNSV daily update is stale';
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            for (const issue of issues.filter((item) => item.title === title && !item.pull_request)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Freshness recovered on the latest 22:00 Beijing check.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

      - name: Fail stale freshness check
        if: steps.freshness.outcome == 'failure'
        run: exit 1
