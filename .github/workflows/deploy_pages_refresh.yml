name: Deploy CNSV Pages Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy_pages_refresh.yml"
  workflow_run:
    workflows:
      - Run CNSV Mainline Daily
      - Run CNSV Trading Decision
    types:
      - completed

concurrency:
  group: cnsv-pages-refresh-main
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages-refresh:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wait for earlier Pages deployment
        run: sleep 90

      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
