name: Deploy CNSV Pages Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy_pages_refresh.yml"
  workflow_run:
    workflows:
      - Run CNSV Mainline Daily
      - Run CNSV Trading Decision
    types:
      - completed

concurrency:
  group: cnsv-pages-refresh-main
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages-refresh:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check whether reports changed
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          current_head="$(git rev-parse HEAD)"
          if [ "$EVENT_NAME" = "workflow_run" ] && [ "$current_head" = "$TRIGGER_HEAD_SHA" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "No report commit was produced; Pages deployment is not needed."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for earlier Pages deployment
        if: steps.changes.outputs.deploy == 'true'
        run: sleep 180

      - name: Refresh latest main after wait
        if: steps.changes.outputs.deploy == 'true'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        if: steps.changes.outputs.deploy == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.changes.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy Pages
        if: steps.changes.outputs.deploy == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
