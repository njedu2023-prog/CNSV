name: Run CNSV realtime next-day prediction

on:
  workflow_dispatch:
  schedule:
    # Six minutes after each CNSVdata refresh, including the Beijing 20:04 final refresh.
    - cron: "56 1 * * 1-5"
    - cron: "16 2 * * 1-5"
    - cron: "36 2 * * 1-5"
    - cron: "56 2 * * 1-5"
    - cron: "16 3 * * 1-5"
    - cron: "36 3 * * 1-5"
    - cron: "16 5 * * 1-5"
    - cron: "36 5 * * 1-5"
    - cron: "56 5 * * 1-5"
    - cron: "16 6 * * 1-5"
    - cron: "36 6 * * 1-5"
    - cron: "56 6 * * 1-5"
    - cron: "16 7 * * 1-5"
    - cron: "10 12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: cnsv-trading-decision-main
  cancel-in-progress: true

jobs:
  run-realtime-prediction:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Wait for matching CNSVdata checkpoint
        id: upstream
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_EXPRESSION: ${{ github.event.schedule }}
          READY_URL: https://raw.githubusercontent.com/njedu2023-prog/CNSVdata/refs/heads/main/metadata/intraday/intraday_realtime_ready.json
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys
          import time
          import urllib.request
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          BEIJING = ZoneInfo("Asia/Shanghai")
          CHECKPOINTS = {
              "56 1 * * 1-5": ("09:50:00", "09:50:00"),
              "16 2 * * 1-5": ("10:10:00", "10:10:00"),
              "36 2 * * 1-5": ("10:30:00", "10:30:00"),
              "56 2 * * 1-5": ("10:50:00", "10:50:00"),
              "16 3 * * 1-5": ("11:10:00", "11:10:00"),
              "36 3 * * 1-5": ("11:30:00", "11:30:00"),
              "16 5 * * 1-5": ("13:10:00", "13:10:00"),
              "36 5 * * 1-5": ("13:30:00", "13:30:00"),
              "56 5 * * 1-5": ("13:50:00", "13:50:00"),
              "16 6 * * 1-5": ("14:10:00", "14:10:00"),
              "36 6 * * 1-5": ("14:30:00", "14:30:00"),
              "56 6 * * 1-5": ("14:50:00", "14:50:00"),
              "16 7 * * 1-5": ("15:00:00", "15:10:00"),
              "10 12 * * 1-5": ("15:00:00", "20:04:00"),
          }

          def compact_date(value):
              return str(value or "")[:10].replace("-", "")

          def parse_created_at(value):
              text = str(value or "").strip().replace("Z", "+00:00")
              if not text:
                  return None
              parsed = datetime.fromisoformat(text)
              if parsed.tzinfo is None:
                  return parsed.replace(tzinfo=BEIJING)
              return parsed.astimezone(BEIJING)

          def emit(should_run, reason):
              print(f"should_run={str(should_run).lower()}")
              print(f"reason={reason}")

          if os.environ["EVENT_NAME"] != "schedule":
              emit(True, "manual_dispatch")
              raise SystemExit(0)

          expression = os.environ.get("SCHEDULE_EXPRESSION", "")
          checkpoint = CHECKPOINTS.get(expression)
          if checkpoint is None:
              print(f"::error::Unknown realtime schedule: {expression!r}", file=sys.stderr)
              raise SystemExit(1)

          expected_asof, upstream_trigger_time = checkpoint
          started = datetime.now(BEIJING)
          today = started.strftime("%Y%m%d")
          trigger_at = datetime.fromisoformat(
              f"{started.date().isoformat()}T{upstream_trigger_time}"
          ).replace(tzinfo=BEIJING)
          deadline = started + timedelta(minutes=18)
          last_state = "upstream_not_checked"

          while True:
              now = datetime.now(BEIJING)
              try:
                  separator = "&" if "?" in os.environ["READY_URL"] else "?"
                  request = urllib.request.Request(
                      f"{os.environ['READY_URL']}{separator}t={time.time_ns()}",
                      headers={"Cache-Control": "no-cache", "User-Agent": "CNSV-realtime-gate"},
                  )
                  with urllib.request.urlopen(request, timeout=20) as response:
                      payload = json.load(response)

                  ready = bool(payload.get("ready")) and payload.get("status") in {"PASS", "WARN"}
                  trade_date = compact_date(payload.get("trade_date"))
                  expected_trade_date = compact_date(payload.get("expected_trade_date"))
                  asof_time = str(payload.get("asof_time") or "")
                  created_at = parse_created_at(payload.get("created_at"))
                  generated_for_checkpoint = created_at is not None and created_at >= trigger_at

                  if ready and generated_for_checkpoint:
                      if expected_trade_date and expected_trade_date != today:
                          emit(False, "non_trading_day")
                          raise SystemExit(0)
                      if trade_date == today and expected_trade_date == today and asof_time >= expected_asof:
                          emit(True, "matching_upstream_checkpoint")
                          raise SystemExit(0)

                  last_state = (
                      f"ready={ready}, trade_date={trade_date}, expected_trade_date={expected_trade_date}, "
                      f"asof={asof_time}, expected_asof={expected_asof}, created_at={created_at}, "
                      f"trigger_at={trigger_at.isoformat()}"
                  )
              except (SystemExit, KeyboardInterrupt):
                  raise
              except Exception as exc:
                  last_state = f"{type(exc).__name__}: {exc}"

              if now >= deadline:
                  print(f"::error::CNSVdata checkpoint did not arrive: {last_state}", file=sys.stderr)
                  raise SystemExit(1)
              print(f"Waiting 30s for CNSVdata checkpoint: {last_state}", file=sys.stderr, flush=True)
              time.sleep(30)
          PY
      - if: steps.upstream.outputs.should_run == 'true'
        run: pip install -r requirements.txt
      - name: Verify realtime model and report contracts
        if: steps.upstream.outputs.should_run == 'true'
        run: pytest -q tests/test_intraday_next_day_model.py tests/test_trading_probability.py tests/test_trading_report.py tests/test_trading_html.py
      - name: Generate latest next-trading-day prediction
        if: steps.upstream.outputs.should_run == 'true'
        run: python -m cnsv.cli.run_trading_decision
      - name: Commit realtime report update
        if: steps.upstream.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs reports
          if git diff --cached --quiet; then
            echo "No realtime report update"
            exit 0
          fi
          git commit -m "report: refresh 20-minute next-day prediction"
          for attempt in 1 2 3; do
            if git pull --rebase -X theirs origin main && git push origin HEAD:main; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 5
          done
