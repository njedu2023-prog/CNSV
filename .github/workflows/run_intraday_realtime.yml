name: Run CNSV realtime next-day prediction

on:
  workflow_dispatch:
  schedule:
    # Beijing morning window: 09:15-11:30, every 20 minutes plus the close endpoint.
    - cron: "15 1 * * 1-5"
    - cron: "35 1 * * 1-5"
    - cron: "55 1 * * 1-5"
    - cron: "15 2 * * 1-5"
    - cron: "35 2 * * 1-5"
    - cron: "55 2 * * 1-5"
    - cron: "15 3 * * 1-5"
    - cron: "30 3 * * 1-5"
    # Beijing afternoon window: 13:00-15:10, every 20 minutes plus the close endpoint.
    - cron: "0 5 * * 1-5"
    - cron: "20 5 * * 1-5"
    - cron: "40 5 * * 1-5"
    - cron: "0 6 * * 1-5"
    - cron: "20 6 * * 1-5"
    - cron: "40 6 * * 1-5"
    - cron: "0 7 * * 1-5"
    - cron: "10 7 * * 1-5"
    # Final daily prediction at Beijing 20:04.
    - cron: "4 12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: cnsv-trading-decision-main
  cancel-in-progress: false

jobs:
  run-realtime-prediction:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify direct Tushare and next-day model contracts
        run: >-
          pytest -q
          tests/test_tushare_realtime.py
          tests/test_intraday_next_day_model.py
          tests/test_trading_probability.py
          tests/test_trading_report.py
          tests/test_trading_html.py
      - name: Fetch Tushare realtime minutes and generate next-day prediction
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python -m cnsv.cli.run_trading_decision
      - name: Commit realtime report update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs reports
          if git diff --cached --quiet; then
            echo "No realtime report update"
            exit 0
          fi
          git commit -m "report: refresh 20-minute next-day prediction"
          for attempt in 1 2 3; do
            if git pull --rebase -X theirs origin main && git push origin HEAD:main; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 5
          done
