name: Run CNSV Trading Decision

on:
  workflow_dispatch:

concurrency:
  group: cnsv-trading-decision-main
  cancel-in-progress: true

jobs:
  run-trading-decision:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Generate data status report
        run: python -m cnsv.cli.generate_data_report
      - name: Generate feature report
        run: python -m cnsv.cli.generate_feature_report
      - name: Generate baseline model report
        run: python -m cnsv.cli.run_baseline_models
      - name: Generate baseline validation report
        run: python -m cnsv.cli.run_baseline_validation
      - name: Generate path distribution report
        run: python -m cnsv.cli.run_path_distribution
      - name: Generate path validation report
        run: python -m cnsv.cli.run_path_validation
      - name: Generate live manual decision report
        run: python -m cnsv.cli.run_live_manual_decision
      - name: Generate trading decision report
        run: python -m cnsv.cli.run_trading_decision
      - name: Commit trading decision updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tmpdir="$(mktemp -d)"
          report_paths=(
            docs
            reports
          )
          actual_paths=()
          for path in "${report_paths[@]}"; do
            for file in $path; do
              if [ -e "$file" ]; then
                actual_paths+=("$file")
              fi
            done
          done
          if [ "${#actual_paths[@]}" -eq 0 ] || git diff --quiet -- "${actual_paths[@]}"; then
            echo "No CNSV report updates to commit"
            exit 0
          fi
          for file in "${actual_paths[@]}"; do
            mkdir -p "$tmpdir/$(dirname "$file")"
            cp -R "$file" "$tmpdir/$file"
          done
          git fetch origin main
          git reset --hard origin/main
          cp -R "$tmpdir"/. .
          git add "${actual_paths[@]}"
          if git diff --cached --quiet; then
            echo "No CNSV report updates after sync"
            exit 0
          fi
          git commit -m "report: update CNSV daily decision reports"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 5
          done
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
