name: Run CNSV Baseline Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "35 9 * * 1-5"

permissions:
  contents: write

jobs:
  run-baseline-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Generate baseline model report
        run: python -m cnsv.cli.run_baseline_models
      - name: Generate baseline validation report
        run: python -m cnsv.cli.run_baseline_validation
      - name: Commit validation report updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore \
            docs/data/latest_baseline_model_report.json \
            docs/data/baseline_registry.json \
            docs/baseline.html \
            docs/index.html \
            reports/latest_baseline_model_report.md \
            reports/archive/*_baseline_model_report.md || true
          git add \
            docs/data/latest_baseline_validation_report.json \
            docs/data/baseline_validation_registry.json \
            docs/validation.html \
            reports/latest_baseline_validation_report.md \
            reports/archive/*_baseline_validation_report.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "report: update CNSV baseline validation report"
          git pull --rebase origin main
          git push
