name: Run CNSV Baseline Validation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-baseline-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Generate baseline model report
        run: python -m cnsv.cli.run_baseline_models
      - name: Generate baseline validation report
        run: python -m cnsv.cli.run_baseline_validation
      - name: Commit validation report updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tmpdir="$(mktemp -d)"
          report_paths=(
            docs/data/latest_baseline_validation_report.json
            docs/data/baseline_validation_registry.json
            reports/latest_baseline_validation_report.md
            reports/archive/*_baseline_validation_report.md
            docs/baseline_validation.html
            docs/index.html
          )
          actual_paths=()
          for path in "${report_paths[@]}"; do
            for file in $path; do
              if [ -e "$file" ]; then
                actual_paths+=("$file")
              fi
            done
          done
          if [ "${#actual_paths[@]}" -eq 0 ] || git diff --quiet -- "${actual_paths[@]}"; then
            echo "No baseline validation updates to commit"
            exit 0
          fi
          for file in "${actual_paths[@]}"; do
            mkdir -p "$tmpdir/$(dirname "$file")"
            cp "$file" "$tmpdir/$file"
          done
          git fetch origin main
          git reset --hard origin/main
          cp -R "$tmpdir"/. .
          git add "${actual_paths[@]}"
          if git diff --cached --quiet; then
            echo "No baseline validation updates after sync"
            exit 0
          fi
          git commit -m "report: update CNSV baseline validation report"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 5
          done
