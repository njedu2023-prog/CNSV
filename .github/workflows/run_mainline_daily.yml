name: Run CNSV Mainline Daily

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "config/**"
      - ".github/workflows/run_mainline_daily.yml"
      - ".github/workflows/run_trading_decision.yml"
      - ".github/workflows/run_live_manual_decision.yml"
      - ".github/workflows/run_human_decision_support.yml"
      - ".github/workflows/run_risk_explanation.yml"
  schedule:
    # Prewake at Beijing 18:24 and 19:24, then hold the runner until 20:24.
    # The check job polls CNSVdata until its new close snapshot is committed.
    - cron: "24 10 * * *"
    - cron: "24 11 * * *"
    - cron: "24 12 * * *"
    - cron: "54 12 * * *"
    - cron: "24 13 * * *"
    - cron: "54 13 * * *"
    - cron: "24 14 * * *"
    - cron: "54 14 * * *"

concurrency:
  group: cnsv-mainline-daily-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 320
    outputs:
      should_run: ${{ steps.freshness.outputs.should_run }}
      reason: ${{ steps.freshness.outputs.reason }}
    steps:
      - name: Hold prewarmed runner until Beijing 20:24
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import time
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Asia/Shanghai"))
          target = now.replace(hour=20, minute=24, second=0, microsecond=0)
          wait_seconds = (target - now).total_seconds()
          if 0 < wait_seconds <= 2 * 60 * 60 + 5 * 60:
              print(f"Prewarmed at {now.isoformat()}; waiting {wait_seconds:.0f}s until {target.isoformat()}")
              time.sleep(wait_seconds)
          else:
              print(f"No prewarm wait needed at {now.isoformat()}")
          PY
      - name: Checkout for freshness comparison
        uses: actions/checkout@v4
      - name: Check whether CNSVdata has a new snapshot
        id: freshness
        env:
          EVENT_NAME: ${{ github.event_name }}
          UPSTREAM_READY_URL: https://raw.githubusercontent.com/njedu2023-prog/CNSVdata/refs/heads/main/metadata/downstream_ready.json
          UPSTREAM_NEXT_DATE_URL: https://raw.githubusercontent.com/njedu2023-prog/CNSVdata/refs/heads/main/metadata/daily/daily_next_trade_date.json
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys
          import time
          import urllib.request
          from datetime import datetime, timedelta
          from pathlib import Path
          from zoneinfo import ZoneInfo

          def iso_date(value):
              text = str(value or "")[:10].replace("-", "")
              return f"{text[:4]}-{text[4:6]}-{text[6:8]}" if len(text) == 8 and text.isdigit() else ""

          def remote_json(url):
              separator = "&" if "?" in url else "?"
              request = urllib.request.Request(
                  f"{url}{separator}t={time.time_ns()}",
                  headers={"Cache-Control": "no-cache", "User-Agent": "CNSV-mainline-freshness"},
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          def emit(should_run, reason):
              print(f"should_run={str(should_run).lower()}")
              print(f"reason={reason}")

          if os.environ["EVENT_NAME"] != "schedule":
              emit(True, "manual_or_code_change")
              raise SystemExit(0)

          current_path = Path("docs/data/latest_trading_decision_report.json")
          current = json.loads(current_path.read_text(encoding="utf-8")) if current_path.exists() else {}
          current_date = iso_date(current.get("trade_date"))
          data_report_path = Path("docs/data/latest_data_report.json")
          data_report = json.loads(data_report_path.read_text(encoding="utf-8")) if data_report_path.exists() else {}
          current_snapshot = str(((data_report.get("data_manifest") or {}).get("snapshot_id")) or "")

          started = datetime.now(ZoneInfo("Asia/Shanghai"))
          end_of_window = started.replace(hour=23, minute=30, second=0, microsecond=0)
          if started.hour < 6 or end_of_window <= started:
              deadline = started + timedelta(minutes=45)
          else:
              deadline = min(started + timedelta(hours=3), end_of_window)

          last_state = "upstream_not_checked"
          while True:
              now = datetime.now(ZoneInfo("Asia/Shanghai"))
              today = now.date().isoformat()
              try:
                  upstream = remote_json(os.environ["UPSTREAM_READY_URL"])
                  next_payload = remote_json(os.environ["UPSTREAM_NEXT_DATE_URL"])
                  upstream_date = iso_date(upstream.get("latest_trade_date"))
                  next_trade = iso_date(next_payload.get("next_trade_date"))
                  upstream_snapshot = str(upstream.get("manifest_snapshot_id") or "")
                  ready = bool(upstream.get("ready")) and upstream.get("status") in {"PASS", "WARN"}
                  changed = bool(upstream_date) and (not current_date or upstream_date != current_date)
                  if current_snapshot and upstream_snapshot:
                      changed = changed or upstream_snapshot != current_snapshot

                  if ready and changed:
                      emit(True, "new_upstream_snapshot")
                      raise SystemExit(0)
                  if ready and upstream_date == current_date and next_trade and today < next_trade:
                      emit(False, "upstream_unchanged_non_trading_day")
                      raise SystemExit(0)
                  last_state = (
                      f"ready={ready}, current={current_date}, upstream={upstream_date}, "
                      f"next={next_trade}, today={today}"
                  )
              except (SystemExit, KeyboardInterrupt):
                  raise
              except Exception as exc:
                  last_state = f"{type(exc).__name__}: {exc}"

              if now >= deadline:
                  emit(False, "upstream_stale_at_deadline")
                  print(f"::error::CNSVdata did not publish a new close snapshot: {last_state}", file=sys.stderr)
                  raise SystemExit(1)

              wait_seconds = min(300, max(1, int((deadline - now).total_seconds())))
              print(
                  f"Waiting {wait_seconds}s for CNSVdata; deadline={deadline.isoformat()}; {last_state}",
                  file=sys.stderr,
                  flush=True,
              )
              time.sleep(wait_seconds)
          PY

  run-mainline-daily:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}/src
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        id: tests
        continue-on-error: true
        run: pytest

      - name: Report non-blocking test failure
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::warning::pytest failed, but daily report generation will continue so Pages data is not left stale."
          echo "Please inspect the test output in this workflow run."

      - name: Generate data report
        run: |
          set +e
          python -m cnsv.cli.generate_data_report
          code=$?
          echo "data_report_exit_code=${code}" >> "$GITHUB_ENV"
          exit 0

      - name: Check CNSVdata gate
        id: data_gate
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          report = Path("docs/data/latest_data_report.json")
          proceed = False
          status = "MISSING"
          reason = "latest_data_report.json missing"
          if report.exists():
              payload = json.loads(report.read_text(encoding="utf-8"))
              gate = payload.get("cnsvdata_gate") or {}
              status = str(gate.get("status") or gate.get("gate_status") or "UNKNOWN")
              reason = str(gate.get("blocking_reason") or gate.get("blocking_reason_cn") or "")
              proceed = bool(gate.get("can_continue")) and status in {"PASS", "WARN"}
          print(f"proceed={str(proceed).lower()}")
          print(f"status={status}")
          print(f"reason={reason}")
          PY

      - name: Report blocked CNSVdata gate
        if: steps.data_gate.outputs.proceed != 'true'
        run: |
          echo "CNSVdata gate is not passable."
          echo "status=${{ steps.data_gate.outputs.status }}"
          echo "reason=${{ steps.data_gate.outputs.reason }}"
          echo "Downstream feature/model/path recomputation is skipped."
          echo "V3.0 trading page will still be refreshed as BLOCKED from existing evidence."

      - name: Generate feature report
        if: steps.data_gate.outputs.proceed == 'true'
        run: python -m cnsv.cli.generate_feature_report

      - name: Generate baseline model report
        if: steps.data_gate.outputs.proceed == 'true'
        run: python -m cnsv.cli.run_baseline_models

      - name: Generate baseline validation report
        if: steps.data_gate.outputs.proceed == 'true'
        run: python -m cnsv.cli.run_baseline_validation

      - name: Generate path distribution report
        if: steps.data_gate.outputs.proceed == 'true'
        run: python -m cnsv.cli.run_path_distribution

      - name: Generate path validation report
        if: steps.data_gate.outputs.proceed == 'true'
        run: python -m cnsv.cli.run_path_validation

      - name: Generate observation backtest report
        if: steps.data_gate.outputs.proceed == 'true'
        run: python -m cnsv.cli.run_observation_backtest

      - name: Generate human decision support report
        id: human_support
        if: steps.data_gate.outputs.proceed == 'true'
        continue-on-error: true
        run: python -m cnsv.cli.run_human_decision_support

      - name: Report non-blocking human support failure
        if: steps.human_support.outcome == 'failure'
        run: |
          echo "::warning::human decision support report failed; V3 trading decision generation will continue with existing support evidence."
          echo "This should be inspected, but it must not leave trading.html stale."

      - name: Generate risk explanation report
        id: risk_explanation
        if: steps.data_gate.outputs.proceed == 'true'
        continue-on-error: true
        run: python -m cnsv.cli.run_risk_explanation

      - name: Report non-blocking risk explanation failure
        if: steps.risk_explanation.outcome == 'failure'
        run: |
          echo "::warning::risk explanation report failed; V3 trading decision generation will continue with existing risk evidence."
          echo "This should be inspected, but it must not leave trading.html stale."

      - name: Generate live manual decision report
        id: live_manual
        if: steps.data_gate.outputs.proceed == 'true'
        continue-on-error: true
        run: python -m cnsv.cli.run_live_manual_decision

      - name: Report non-blocking live manual failure
        if: steps.live_manual.outcome == 'failure'
        run: |
          echo "::warning::live manual decision report failed; V3 trading decision generation will continue with existing live evidence."
          echo "This should be inspected, but it must not leave trading.html stale."

      - name: Generate trading decision report
        run: |
          set +e
          python - <<'PY'
          import traceback
          from cnsv.cli.run_trading_decision import main
          try:
              raise SystemExit(main())
          except SystemExit:
              raise
          except Exception:
              traceback.print_exc()
              raise
          PY
          code=$?
          if [ "$code" -ne 0 ]; then
            echo "::error::run_trading_decision failed with exit code $code"
            python - <<'PY'
          import json
          from pathlib import Path
          names = [
              "latest_data_report.json",
              "latest_feature_report.json",
              "latest_baseline_model_report.json",
              "latest_path_distribution_report.json",
              "latest_observation_backtest_report.json",
              "latest_human_decision_support_report.json",
              "latest_risk_explanation_report.json",
              "latest_live_manual_decision_report.json",
              "latest_trading_decision_report.json",
              "live_stats_registry.json",
          ]
          for name in names:
              path = Path("docs/data") / name
              print(f"DIAG {name} exists={path.exists()} size={path.stat().st_size if path.exists() else 'NA'}")
              if not path.exists():
                  continue
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"DIAG {name} json_error={exc!r}")
                  continue
              if isinstance(payload, dict):
                  meta = payload.get("meta") or {}
                  print("DIAG", name, "generated_at=", payload.get("generated_at") or meta.get("generated_at"))
                  print("DIAG", name, "trade_date=", payload.get("trade_date") or meta.get("trade_date") or meta.get("latest_trade_date") or ((payload.get("data_manifest") or {}).get("latest_trade_date")))
                  print("DIAG", name, "status=", ((payload.get("cnsvdata_gate") or {}).get("status") or (payload.get("quality") or {}).get("status") or (payload.get("risk_explanation_quality") or {}).get("status") or (payload.get("live_manual_decision_quality") or {}).get("status")))
              elif isinstance(payload, list):
                  print("DIAG", name, "items=", len(payload))
                  print("DIAG", name, "tail=", payload[-3:])
          PY
          fi
          exit "$code"

      - name: Commit mainline report updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs reports
          if git diff --cached --quiet; then
            echo "No CNSV mainline report updates to commit"
            exit 0
          fi
          git commit -m "report: update CNSV mainline daily reports"
          for attempt in 1 2 3; do
            if git pull --rebase -X theirs origin main && git push origin HEAD:main; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            git rebase --abort || true
            sleep 5
          done
