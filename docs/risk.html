<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CNSV V3.0 交易决策系统</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;--page:#f5f5f7;--surface:#fff;--line:#d2d2d7;--text:#1d1d1f;--muted:#6e6e73;--blue:#06c;--green:#0b8f45;--red:#d70015;--amber:#8a5a00;--shadow:0 18px 44px rgba(0,0,0,.06)}
    *{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--text)}main{width:min(100%,1180px);margin:auto;padding:38px 24px 48px}header{text-align:center;padding:18px 0 28px}.eyebrow{color:var(--blue);font-size:13px;font-weight:700;letter-spacing:.08em;margin:0 0 8px}h1{font-size:18px;margin:0}.subtitle{color:var(--muted);font-size:13px;margin:12px auto 0;max-width:880px;line-height:1.45}nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}nav a{border:1px solid var(--line);border-radius:999px;color:var(--blue);text-decoration:none;padding:6px 11px;font-size:12px;background:#fff}section{background:var(--surface);border-radius:20px;padding:22px 26px;margin:16px 0;box-shadow:var(--shadow);overflow:hidden}h2{font-size:14px;margin:0 0 14px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);border-radius:999px;background:#fff;padding:7px 11px;color:var(--muted);font-size:12px}.chip strong{color:var(--text);margin-left:6px}.ok{color:var(--green)!important;font-weight:700}.bad{color:var(--red)!important;font-weight:700}.warn{color:var(--amber)!important;font-weight:700}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfbfd}.label{color:var(--muted);font-size:12px}.value{font-weight:700;font-size:13px;margin-top:8px;overflow-wrap:anywhere}.list{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:#fbfbfd;font-size:12px;line-height:1.45}.footer{color:var(--muted);font-size:12px;text-align:center;padding:18px 0 4px}@media(max-width:720px){main{padding:22px 14px 36px}header{text-align:left}nav{justify-content:flex-start}section{border-radius:18px;padding:18px}.grid{grid-template-columns:1fr}}
    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(0,0,0,.88); backdrop-filter: saturate(180%) blur(18px); border-bottom: 1px solid rgba(255,255,255,.16); }
    .topnav { display: flex; justify-content: center; gap: 2px; flex-wrap: nowrap; overflow-x: auto; white-space: nowrap; padding: 9px 18px; -webkit-overflow-scrolling: touch; }
    .topnav a { border: 0; border-radius: 999px; background: transparent; color: #fff; text-decoration: none; padding: 4px 10px; font-size: 12px; line-height: 1.2; white-space: nowrap; opacity: .78; }
    .topnav a:hover, .topnav a.active { color: #fff; opacity: 1; }
    .topnav a.active { font-weight: 600; background: rgba(255,255,255,.12); }
    .global-nav, header nav { display: none !important; }
    body { padding-top: 48px; }
    main { padding-top: 26px !important; }
    header { text-align: center !important; padding: 16px 0 20px !important; }
    header .eyebrow, .hero .eyebrow { color: #d70015 !important; font-size: 12px !important; font-weight: 700 !important; letter-spacing: .08em !important; margin: 0 0 8px !important; }
    header h1, h1 { font-size: clamp(30px, 4vw, 52px) !important; letter-spacing: 0 !important; margin: 5px 0 8px !important; line-height: 1.08 !important; }
    header .subtitle { display: none !important; }
    @media (max-width: 760px) { body { padding-top: 50px; } .topnav { justify-content: flex-start; } header h1, h1 { font-size: 30px !important; } }

  </style>
</head>
<body>
<div class="topbar"><nav class="topnav" aria-label="CNSV 全量菜单"><a href="trading.html">交易决策</a><a href="index.html#coverage">数据状态</a><a href="index.html#priceVolumeCards">核心特征</a><a href="baseline.html">基准模型</a><a href="validation.html">基准验证</a><a href="path.html">路径分布</a><a href="backtest.html">观察回测</a><a href="decision_support.html">人工辅助</a><a href="risk.html" class="active">风控解释</a><a href="live.html">人工确认</a></nav></div><main>
<header><p class="eyebrow">CNSV V3.0 交易决策系统</p>
    <h1>中国船舶 600150.SH</h1></header>
<section><h2>阶段总览</h2><div id="overview" class="chips"></div></section>
<section><h2>证据可用性</h2><div id="availability" class="chips"></div></section>
<section><h2>风险总览</h2><div id="summary" class="grid"></div></section>
<section><h2>风险来源拆解</h2><div id="breakdown" class="grid"></div></section>
<section><h2>分类风险解释</h2><div id="explain" class="list"></div></section>
<section><h2>风险情景卡片</h2><div id="cards" class="grid"></div></section>
<section><h2>风险复核清单</h2><div id="checklist" class="list"></div></section>
<section><h2>禁止交易信号声明</h2><div id="guardrails" class="chips"></div></section>
<div id="footer" class="footer"></div>
</main><script>
const fmt=v=>v===null||v===undefined?"N/A":typeof v==="number"?v.toFixed(4):v;
const cls=v=>v==="PASS"?"ok":v==="FAIL"?"bad":v==="WARN"?"warn":v==="high"||v==="severe"?"bad":v==="medium"?"warn":"";
const chip=(l,v,c=cls(v))=>`<span class="chip">${l}<strong class="${c}">${fmt(v)}</strong></span>`;
const card=(l,v)=>`<div class="card"><div class="label">${l}</div><div class="value">${fmt(v)}</div></div>`;
const item=v=>`<div class="item">${v}</div>`;
fetch("data/latest_risk_explanation_report.json").then(r=>r.json()).then(d=>{
 const meta=d.meta||{}, q=d.risk_explanation_quality||{}, av=d.risk_evidence_availability||{}, s=d.overall_risk_summary||{};
 overview.innerHTML=[chip("版本",meta.version),chip("阶段",meta.stage),chip("质量",q.status),chip("交易信号",meta.is_trade_signal?"YES":"NO",meta.is_trade_signal?"bad":"ok")].join("");
 availability.innerHTML=[chip("全部可用",av.all_required_available),chip("可用数量",(av.available_reports||[]).length),chip("缺失数量",(av.missing_reports||[]).length)].concat((av.missing_reports||[]).map(x=>chip("缺失",x,"warn"))).join("");
 summary.innerHTML=Object.entries(s).map(([k,v])=>card(k,Array.isArray(v)?v.join(", "):v)).join("");
 breakdown.innerHTML=Object.entries(d.risk_source_breakdown||{}).map(([k,v])=>card(k,`${v.risk_level} · ${v.risk_reason}`)).join("");
 const sections=["data_risk_explanation","feature_risk_explanation","baseline_model_risk_explanation","path_distribution_risk_explanation","observation_backtest_risk_explanation","decision_support_risk_explanation","p2_auxiliary_risk_explanation","evidence_conflict_risk_explanation"];
 explain.innerHTML=sections.map(k=>item(`<b>${k}</b><br>${JSON.stringify(d[k]||{},null,2)}`)).join("");
 cards.innerHTML=(d.risk_scenario_cards||[]).map(x=>card(x.scenario_name,`${x.risk_level} · ${x.risk_explanation}`)).join("");
 checklist.innerHTML=(d.risk_review_checklist||[]).map(x=>item(`[${x.id}] ${x.text}`)).join("");
 guardrails.innerHTML=(d.forbidden_actions||[]).map(x=>chip("禁止",x,"bad")).concat([chip("下一阶段",d.next_stage)]).join("");
 footer.textContent=`generated_at: ${meta.generated_at}`;
}).catch(e=>overview.innerHTML=`<span class="bad">加载失败：${e}</span>`);
</script></body></html>
