<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CNSV V3.0 交易决策系统</title><style>:root{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;--page:#f5f5f7;--surface:#fff;--line:#d2d2d7;--text:#1d1d1f;--muted:#6e6e73;--blue:#06c;--green:#0b8f45;--red:#d70015;--shadow:0 18px 44px rgba(0,0,0,.06)}*{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--text)}main{width:min(100%,1180px);margin:auto;padding:38px 24px 48px}header{text-align:center;padding:18px 0 28px}.eyebrow{color:var(--blue);font-size:13px;font-weight:700;letter-spacing:.08em;margin:0 0 8px}h1{font-size:18px;margin:0}.subtitle{color:var(--muted);font-size:13px;margin:12px auto 0;max-width:860px;line-height:1.45}nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}nav a{border:1px solid var(--line);border-radius:999px;color:var(--blue);text-decoration:none;padding:6px 11px;font-size:12px;background:#fff}section{background:var(--surface);border-radius:20px;padding:22px 26px;margin:16px 0;box-shadow:var(--shadow)}h2{font-size:14px;margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:10px}.card{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfbfd}.label{color:var(--muted);font-size:12px}.value{font-weight:700;font-size:13px;margin-top:8px;overflow-wrap:anywhere}.footer{color:var(--muted);font-size:12px;text-align:center}
    body { padding-top: 48px; }
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(0,0,0,.88); backdrop-filter: saturate(180%) blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .topnav {
      display: flex; justify-content: center; gap: 2px; flex-wrap: nowrap;
      overflow-x: auto; white-space: nowrap; padding: 9px 18px;
      -webkit-overflow-scrolling: touch;
    }
    .topnav a {
      border: 0; border-radius: 999px; background: transparent; color: #fff;
      text-decoration: none; padding: 4px 10px; font-size: 12px;
      line-height: 1.2; white-space: nowrap; opacity: .78;
    }
    .topnav a:hover,
    .topnav a.active { color: #fff; opacity: 1; }
    .topnav a.active { font-weight: 600; background: rgba(255,255,255,.12); }
    .global-nav { display: none !important; }
    header nav { display: none !important; }
    main { padding-top: 26px !important; }
    header, .site-hero { text-align: center !important; padding: 16px 0 20px !important; }
    header .eyebrow,
    .site-hero .eyebrow,
    .hero .eyebrow {
      color: #d70015 !important; font-size: 12px !important; font-weight: 700 !important;
      letter-spacing: .08em !important; margin: 0 0 5px !important;
    }
    h1 { font-size: 30px !important; letter-spacing: 0 !important; margin: 5px 0 8px !important; }
    h2 { font-size: 14px !important; letter-spacing: 0 !important; }
    header .subtitle { display: none !important; }
    .metric { padding: 10px 12px !important; }
    .value { font-size: 13px !important; line-height: 1.26 !important; }
    .label, .chip, table { font-size: 12px !important; }
    section { margin: 12px 0 !important; padding: 18px 22px !important; }
    @media (max-width: 760px) {
      body { padding-top: 50px; }
      .topnav { justify-content: flex-start; }
      main { padding-left: 14px !important; padding-right: 14px !important; }
      h1 { font-size: 24px !important; }
      section { padding: 16px !important; }
    }

  </style></head><body>
<div class="topbar"><nav class="topnav" aria-label="CNSV 全量菜单"><a href="trading.html">交易决策</a><a href="index.html#coverage">数据状态</a><a href="index.html#priceVolumeCards">核心特征</a><a href="baseline.html">基准模型</a><a href="validation.html">基准验证</a><a href="path.html">路径分布</a><a href="backtest.html">观察回测</a><a href="decision_support.html" class="active">人工辅助</a><a href="risk.html">风控解释</a><a href="live.html">人工确认</a></nav></div><main>
  <header class="site-hero">
    <p class="eyebrow">CNSV V3.0 交易决策系统</p>
    <h1>中国船舶 600150.SH</h1>
  </header>
<section><h2>阶段总览</h2><div id="overview" class="grid"></div></section><section><h2>当前状态摘要</h2><div id="state" class="grid"></div></section><section><h2>人工关注点</h2><div id="attention" class="grid"></div></section><section><h2>禁止交易信号声明</h2><div id="guard" class="grid"></div></section><div id="footer" class="footer"></div></main><script>const fmt=v=>v===null||v===undefined?'N/A':typeof v==='object'?JSON.stringify(v):v;const card=(l,v)=>`<div class="card"><div class="label">${l}</div><div class="value">${fmt(v)}</div></div>`;fetch('data/latest_human_decision_support_report.json').then(r=>r.json()).then(d=>{const m=d.meta||{},q=d.human_decision_support_quality||{};overview.innerHTML=[card('版本',m.version),card('阶段',m.stage),card('质量',q.status),card('交易信号',m.is_trade_signal?'YES':'NO')].join('');state.innerHTML=Object.entries(d.current_state_summary||{}).map(([k,v])=>card(k,v)).join('');attention.innerHTML=(d.human_attention_items||[]).map(x=>card(x.category,x.text)).join('');guard.innerHTML=(d.forbidden_actions||[]).map(x=>card('禁止动作',x)).join('');footer.textContent='generated_at: '+(m.generated_at||'N/A')});</script></body></html>
