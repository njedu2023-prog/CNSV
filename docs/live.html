<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CNSV V3.0 交易决策系统</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;--page:#f5f5f7;--surface:#fff;--line:#d2d2d7;--text:#1d1d1f;--muted:#6e6e73;--blue:#06c;--green:#0b8f45;--red:#d70015;--amber:#8a5a00;--shadow:0 18px 44px rgba(0,0,0,.06)}
    *{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--text)}main{width:min(100%,1220px);margin:auto;padding:34px 22px 46px}header{text-align:center;padding:18px 0 24px}.eyebrow{color:var(--blue);font-size:13px;font-weight:700;letter-spacing:.08em;margin:0 0 8px}h1{font-size:18px;margin:0}.subtitle{color:var(--muted);font-size:13px;line-height:1.45;max-width:900px;margin:12px auto 0}nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}nav a{border:1px solid var(--line);border-radius:999px;color:var(--blue);text-decoration:none;padding:6px 11px;font-size:12px;background:#fff}section{background:var(--surface);border-radius:20px;padding:22px 26px;margin:16px 0;box-shadow:var(--shadow);overflow:hidden}h2{font-size:14px;margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,210px),1fr));gap:10px}.card{border:1px solid var(--line);border-radius:15px;padding:13px;background:#fbfbfd}.label{color:var(--muted);font-size:12px}.value{font-weight:700;font-size:13px;margin-top:7px;overflow-wrap:anywhere}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);border-radius:999px;background:#fff;padding:7px 10px;color:var(--muted);font-size:12px}.chip strong{margin-left:5px;color:var(--text)}.ok{color:var(--green)!important}.bad{color:var(--red)!important}.warn{color:var(--amber)!important}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:15px;background:#fbfbfd}table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}th,td{border-top:1px solid #e8e8ed;text-align:left;padding:9px 11px;vertical-align:top;line-height:1.38}tr:first-child th,tr:first-child td{border-top:0}th{width:32%;color:var(--muted);font-weight:600}.block{border:1px solid var(--line);border-radius:15px;background:#fbfbfd;padding:13px;margin-top:10px}.block-title{font-size:13px;font-weight:700;margin-bottom:8px}.list{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:14px;background:#fbfbfd;padding:11px 13px;font-size:12px;line-height:1.45}.footer{color:var(--muted);text-align:center;font-size:12px;padding:16px 0}@media(max-width:720px){main{padding:22px 14px 34px}header{text-align:left}nav{justify-content:flex-start}section{padding:18px;border-radius:18px}.grid{grid-template-columns:1fr}table{min-width:0}th,td{display:block;width:100%}td{border-top:0;padding-top:0}}
  
    body { padding-top: 48px; }
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(0,0,0,.88); backdrop-filter: saturate(180%) blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .topnav {
      display: flex; justify-content: center; gap: 2px; flex-wrap: nowrap;
      overflow-x: auto; white-space: nowrap; padding: 9px 18px;
      -webkit-overflow-scrolling: touch;
    }
    .topnav a {
      border: 0; border-radius: 999px; background: transparent; color: #fff;
      text-decoration: none; padding: 4px 10px; font-size: 12px;
      line-height: 1.2; white-space: nowrap; opacity: .78;
    }
    .topnav a:hover,
    .topnav a.active { color: #fff; opacity: 1; }
    .topnav a.active { font-weight: 600; background: rgba(255,255,255,.12); }
    .global-nav { display: none !important; }
    header nav { display: none !important; }
    main { padding-top: 26px !important; }
    header, .site-hero { text-align: center !important; padding: 16px 0 20px !important; }
    header .eyebrow,
    .site-hero .eyebrow,
    .hero .eyebrow {
      color: #d70015 !important; font-size: 12px !important; font-weight: 700 !important;
      letter-spacing: .08em !important; margin: 0 0 5px !important;
    }
    h1 { font-size: 30px !important; letter-spacing: 0 !important; margin: 5px 0 8px !important; }
    h2 { font-size: 14px !important; letter-spacing: 0 !important; }
    header .subtitle { display: none !important; }
    .metric { padding: 10px 12px !important; }
    .value { font-size: 13px !important; line-height: 1.26 !important; }
    .label, .chip, table { font-size: 12px !important; }
    section { margin: 12px 0 !important; padding: 18px 22px !important; }
    @media (max-width: 760px) {
      body { padding-top: 50px; }
      .topnav { justify-content: flex-start; }
      main { padding-left: 14px !important; padding-right: 14px !important; }
      h1 { font-size: 24px !important; }
      section { padding: 16px !important; }
    }

  </style>
</head>
<body>
<div class="topbar"><nav class="topnav" aria-label="CNSV 全量菜单"><a href="trading.html">交易决策</a><a href="index.html#coverage">数据状态</a><a href="index.html#priceVolumeCards">核心特征</a><a href="baseline.html">基准模型</a><a href="validation.html">基准验证</a><a href="path.html">路径分布</a><a href="backtest.html">观察回测</a><a href="decision_support.html">人工辅助</a><a href="risk.html">风控解释</a><a href="live.html" class="active">人工确认</a></nav></div>
<main>
  
  <header class="site-hero">
    <p class="eyebrow">CNSV V3.0 交易决策系统</p>
    <h1>中国船舶 600150.SH</h1>
  </header>

  <section><h2>阶段说明</h2><div id="overview" class="chips"></div></section>
  <section><h2>验收状态</h2><div id="quality" class="grid"></div></section>
  <section><h2>当前状态总览</h2><div id="state" class="grid"></div></section>
  <section><h2>上游证据</h2><div id="evidence"></div></section>
  <section><h2>当前盘面状态</h2><div id="current"></div></section>
  <section><h2>路径观察</h2><div id="path"></div></section>
  <section><h2>风险解释</h2><div id="risk"></div></section>
  <section><h2>证据冲突</h2><div id="conflict"></div></section>
  <section><h2>人工复核清单</h2><div id="checklist" class="list"></div></section>
  <section><h2>人工确认面板</h2><div id="panel" class="grid"></div></section>
  <section><h2>禁止自动交易声明</h2><div id="guard" class="chips"></div></section>
  <div id="footer" class="footer"></div>
</main>
<script>
const labelMap={
version:"版本",stage:"阶段",latest_trade_date:"最新交易日",is_trade_signal:"是否交易信号",manual_decision_status:"人工决策状态",status:"状态",failed_count:"失败数量",warn_count:"警告数量",blocking_error_count:"阻断错误数量",latest_close:"最新收盘价",latest_pct_chg:"最新涨跌幅",data_status:"数据状态",feature_status:"特征状态",baseline_status:"基准模型状态",baseline_validation_status:"基准验证状态",path_status:"路径分布状态",path_validation_status:"路径验证状态",backtest_status:"观察级回测状态",support_status:"人工辅助状态",risk_status:"风控解释状态",overall_system_status:"系统总状态",manual_review_required:"是否需要人工复核",status_reasons:"状态原因",evidence_availability:"证据可用性",all_required_available:"必要证据是否齐全",available_reports:"可用报告",missing_reports:"缺失报告",missing_evidence:"缺失证据",stale_evidence:"过期证据",failed_quality_gates:"失败门禁",warning_quality_gates:"警告门禁",reports:"报告明细",quality_status:"质量状态",current_price_context:"价格状态",trend_state_context:"趋势状态",volatility_state_context:"波动率状态",flow_strength_context:"资金流状态",minute_structure_context:"分钟结构",state_sample_context:"状态样本",ma5:"MA5",ma20:"MA20",ma5_minus_ma20:"MA5-MA20",close_above_ma20:"收盘在 MA20 上方",trend_state:"趋势状态",volatility_state:"波动率状态",realized_vol_20d:"20D 实现波动率",atr_14d:"ATR 14D",flow_strength_basic:"资金流强弱",main_force_net:"主力净流入",net_mf_ratio:"净流入占比",flow_strength_score:"资金流强弱分",price_flow_confirm:"价格资金确认",price_flow_divergence:"价格资金背离",volume_flow_confirm:"量能资金确认",latest_intraday_close:"日内最新价",intraday_range_pct:"日内振幅",close_position_in_day_range:"日内收盘位置",terminal_distribution_summary:"终点分布摘要",touch_up_summary:"上触概率摘要",touch_down_summary:"下触概率摘要",drawdown_summary:"回撤摘要",path_validation_summary:"路径验证摘要",observation_backtest_support:"观察级回测支持",scope:"范围",model_comparison:"模型对比",overall_risk_level:"总体风险等级",risk_confidence:"风险置信度",primary_risk_sources:"主要风险来源",secondary_risk_sources:"次要风险来源",risk_scenario_cards:"风险情景卡",risk_review_checklist:"风险复核清单",evidence_conflict:"是否存在证据冲突",conflict_reasons:"冲突原因",model_disagreement_points:"模型分歧点",risk_conflict_points:"风险冲突点",manual_confirmation_required:"是否需要人工确认",decision_session_id:"决策会话 ID",decision_snapshot_id:"决策快照 ID",manual_review_status:"人工复核状态",required:"是否必填",confirmed:"是否已确认",text:"内容",id:"编号",name:"名称",detail:"说明",path:"路径",report:"报告",quality_key:"质量键",auto_order_enabled:"自动下单",broker_api_enabled:"券商接口",formal_signal_enabled:"正式信号",forbidden_actions:"禁止动作",generated_at:"生成时间"};
const valueMap={PASS:"通过",WARN:"警告",FAIL:"失败",MISSING:"缺失","N/A":"N/A",true:"是",false:"否",review_required:"需要人工复核",ready_for_manual_review:"可进入人工复核",manual_review_completed:"人工复核已完成",not_started:"未开始",risk_blocked:"风险阻断",evidence_incomplete:"证据不完整",high:"高",medium:"中",low:"低",mixed:"混合",downtrend:"下行",uptrend:"上行",range:"震荡",formal_signal_generation:"正式信号生成",auto_order:"自动下单",broker_api:"券商接口"};
const percentKeys=new Set(["latest_pct_chg","net_mf_ratio","realized_vol_20d","intraday_range_pct","close_position_in_day_range","touch_up_5pct_prob","touch_up_10pct_prob","touch_down_5pct_prob","touch_down_10pct_prob","max_drawdown_p50","max_drawdown_p90"]);
const moneyKeys=new Set(["main_force_net"]);
const label=k=>labelMap[k]||k;
const tone=v=>v==="PASS"||v===true||v==="ready_for_manual_review"?"ok":v==="FAIL"||v==="risk_blocked"||v===false?"bad":v==="WARN"||v==="review_required"||v==="high"?"warn":"";
const fmt=(v,k="")=>{if(v===null||v===undefined||v==="")return"N/A";if(typeof v==="boolean")return valueMap[String(v)];if(typeof v==="number"){if(percentKeys.has(k))return(v*100).toLocaleString("zh-CN",{maximumFractionDigits:2,minimumFractionDigits:2})+"%";if(moneyKeys.has(k))return v.toLocaleString("zh-CN",{maximumFractionDigits:2,minimumFractionDigits:2});return Number.isInteger(v)?v.toLocaleString("zh-CN"):v.toLocaleString("zh-CN",{maximumFractionDigits:4,minimumFractionDigits:4})}return valueMap[v]||String(v)};
const chip=(l,v,c=tone(v))=>`<span class="chip">${label(l)}<strong class="${c}">${fmt(v,l)}</strong></span>`;
const card=(l,v)=>`<div class="card"><div class="label">${label(l)}</div><div class="value ${tone(v)}">${fmt(v,l)}</div></div>`;
const table=obj=>`<div class="table-wrap"><table><tbody>${Object.entries(obj||{}).map(([k,v])=>`<tr><th>${label(k)}</th><td>${renderValue(v,k)}</td></tr>`).join("")}</tbody></table></div>`;
const renderArray=(arr,k)=>arr.length?`<div class="list">${arr.map(v=>`<div class="item">${typeof v==="object"&&v!==null?table(v):fmt(v,k)}</div>`).join("")}</div>`:"无";
const renderObject=obj=>Object.keys(obj||{}).length?table(obj):"无";
const renderValue=(v,k="")=>Array.isArray(v)?renderArray(v,k):(typeof v==="object"&&v!==null?renderObject(v):`<span class="${tone(v)}">${fmt(v,k)}</span>`);
const block=(title,obj)=>`<div class="block"><div class="block-title">${label(title)}</div>${renderObject(obj)}</div>`;
fetch("data/latest_live_manual_decision_report.json").then(r=>r.json()).then(d=>{const m=d.meta||{},q=d.live_manual_decision_quality||{},s=d.live_state_overview||{},e=d.evidence_dashboard||{},p=d.manual_confirmation_panel||{};overview.innerHTML=[chip("version",m.version),chip("stage","V2.0 实盘人工决策系统"),chip("is_trade_signal",m.is_trade_signal),chip("manual_decision_status",d.manual_decision_status)].join("");quality.innerHTML=[card("status",q.status),card("failed_count",q.failed_count),card("warn_count",q.warn_count),card("blocking_error_count",q.blocking_error_count)].join("");state.innerHTML=Object.entries(s).map(([k,v])=>card(k,v)).join("");evidence.innerHTML=[block("evidence_availability",(d.live_decision_evidence_availability||{})),block("evidence_dashboard",e)].join("");current.innerHTML=Object.entries(d.current_state_card||{}).map(([k,v])=>block(k,v)).join("");path.innerHTML=Object.entries(d.path_observation_card||{}).map(([k,v])=>block(k,v)).join("");risk.innerHTML=Object.entries(d.risk_explanation_card||{}).map(([k,v])=>block(k,v)).join("");conflict.innerHTML=Object.entries(d.evidence_conflict_card||{}).map(([k,v])=>block(k,v)).join("");checklist.innerHTML=(d.manual_review_checklist||[]).map(x=>`<div class="item"><b>${fmt(x.id)}</b> ${fmt(x.text)}</div>`).join("")||"<div class='item'>无</div>";panel.innerHTML=Object.entries(p).map(([k,v])=>card(k,v)).join("");guard.innerHTML=[chip("auto_order_enabled",d.auto_order_enabled,d.auto_order_enabled?"bad":"ok"),chip("broker_api_enabled",d.broker_api_enabled,d.broker_api_enabled?"bad":"ok"),chip("formal_signal_enabled",d.formal_signal_enabled,d.formal_signal_enabled?"bad":"ok")].concat((d.forbidden_actions||[]).map(x=>chip("forbidden_actions",x,"bad"))).join("");footer.textContent=`生成时间：${fmt(m.generated_at)}`}).catch(e=>overview.innerHTML=`<span class="bad">加载失败：${e}</span>`);
</script>
</body>
</html>
